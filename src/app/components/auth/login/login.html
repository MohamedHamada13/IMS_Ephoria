<div class="container" style="max-width: 520px">
  <h2 class="mb-3">Login</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    @if (errorMessage()) {
      <div class="alert alert-danger" role="alert">{{ errorMessage() }}</div>
    }

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input
        id="email"
        type="email"
        class="form-control"
        formControlName="email"
        autocomplete="email"
        [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
      />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <div class="form-text text-danger">Please enter a valid email.</div>
      }
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input
        id="password"
        type="password"
        class="form-control"
        formControlName="password"
        autocomplete="current-password"
        [attr.aria-invalid]="
          form.controls.password.invalid && form.controls.password.touched
        "
      />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <div class="form-text text-danger">Password must be at least 6 characters.</div>
      }
    </div>

    <button
      type="submit"
      class="btn btn-primary w-100"
      [disabled]="isSubmitting()"
    >
      @if (isSubmitting()) { Logging in... } @else { Login }
    </button>

    <p class="mt-3 mb-0 text-center">
      No account?
      <a routerLink="/register">Register</a>
    </p>
  </form>
</div>
