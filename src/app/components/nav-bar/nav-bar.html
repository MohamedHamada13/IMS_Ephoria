<nav class="navbar navbar-expand navbar-dark bg-dark w-100">
  <div class="container-fluid px-5">
    <span class="navbar-brand mb-0 h1">Ephoria IMS</span>

    <div class="d-flex gap-2">
      @if (auth.isAuthenticated()) {
        <span class="navbar-text text-light me-2">
          Hi, {{ auth.displayName() ?? 'User' }}
        </span>
        <button type="button" class="btn btn-outline-light" (click)="logout()">
          Logout
        </button>
      } @else {
        <a class="btn btn-outline-light" routerLink="/login" routerLinkActive="active">
          Login
        </a>
        <a
          class="btn btn-primary"
          routerLink="/register"
          routerLinkActive="active"
        >
          Register
        </a>
      }
    </div>
  </div>
</nav>
